# Configuration Nginx de reverse proxy pour Next.js
# À placer dans /etc/nginx/sites-available/maamoura-hotel et faire un lien symbolique vers sites-enabled

server {
    listen 80;
    server_name maamoura.luxtech.ma;

    # Redirection automatique HTTP vers HTTPS
    return 301 https://$host$request_uri;
}

# Configuration HTTPS (Une fois Let's Encrypt / Certbot configuré)
server {
    listen 443 ssl http2;
    server_name maamoura.luxtech.ma;

    ssl_certificate /etc/letsencrypt/live/maamoura.luxtech.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maamoura.luxtech.ma/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Compression Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optimisation du chargement des fichiers statiques Next.js
    location /_next/static {
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_pass http://localhost:3000;
        access_log off;
        expires 365d;
    }
}
